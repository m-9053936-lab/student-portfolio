<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Aurora Chronosphere</title>

<style>
:root{
    --bg1:#050816;
    --bg2:#100824;
    --bg3:#1b103f;

    --violet:#9b5cff;
    --purple:#c084fc;
    --cyan:#67e8f9;
    --blue:#60a5fa;
    --pink:#f472b6;
    --white:#f8fafc;

    --glass:rgba(255,255,255,.05);
    --glass-border:rgba(255,255,255,.12);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    position:relative;
    background:
        radial-gradient(circle at 20% 20%, rgba(155,92,255,.18), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(103,232,249,.12), transparent 25%),
        radial-gradient(circle at 50% 85%, rgba(244,114,182,.10), transparent 35%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 50%,var(--bg3));
}

/* Background Layers */

.nebula{
    position:absolute;
    width:180%;
    height:180%;
    border-radius:50%;
    filter:blur(130px);
    mix-blend-mode:screen;
    pointer-events:none;
}

.nebula1{
    background:
        radial-gradient(circle,
        rgba(155,92,255,.22),
        transparent 65%);
    animation:floatNebula 25s ease-in-out infinite;
}

.nebula2{
    background:
        radial-gradient(circle,
        rgba(103,232,249,.14),
        transparent 70%);
    animation:floatNebula 35s ease-in-out infinite reverse;
}

@keyframes floatNebula{
    0%,100%{
        transform:translate(-5%,-5%) scale(1);
    }
    50%{
        transform:translate(5%,5%) scale(1.2);
    }
}

.aurora{
    position:absolute;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle at 20% 30%,rgba(155,92,255,.35),transparent 30%),
        radial-gradient(circle at 80% 20%,rgba(103,232,249,.25),transparent 30%),
        radial-gradient(circle at 55% 70%,rgba(244,114,182,.18),transparent 35%);
    filter:blur(90px) saturate(160%);
    animation:auroraMove 20s ease-in-out infinite alternate;
}

@keyframes auroraMove{
    from{
        transform:translate(-10%,-10%) rotate(0deg);
    }
    to{
        transform:translate(10%,10%) rotate(20deg);
    }
}

.milky-way{
    position:absolute;
    width:180%;
    height:250px;
    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.08),
            rgba(155,92,255,.18),
            rgba(103,232,249,.12),
            transparent
        );
    filter:blur(35px);
    transform:rotate(-25deg) translateY(-180px);
    animation:galaxy 20s ease-in-out infinite alternate;
}

@keyframes galaxy{
    from{opacity:.35;}
    to{opacity:.75;}
}

/* Stars */

.stars,
.shooting-stars{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.star{
    position:absolute;
    border-radius:50%;
    background:white;
    animation:twinkle 3s infinite;
    box-shadow:
        0 0 8px white,
        0 0 16px rgba(103,232,249,.7);
}

@keyframes twinkle{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

/* Shooting Stars */

.shooting-star{
    position:absolute;
    width:2px;
    height:120px;
    background:
        linear-gradient(
            to bottom,
            transparent,
            rgba(103,232,249,.9)
        );
    transform:rotate(45deg);
    animation:shoot 3s linear forwards;
}

@keyframes shoot{
    from{
        transform:translate(0,0) rotate(45deg);
        opacity:1;
    }
    to{
        transform:translate(500px,500px) rotate(45deg);
        opacity:0;
    }
}

/* Sakura Petals */

.petal{
    position:absolute;
    width:10px;
    height:10px;
    background:rgba(244,114,182,.8);
    border-radius:60% 40% 70% 30%;
    filter:blur(.5px);
    animation:fall linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-100px) rotate(0deg);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(110vh) translateX(120px) rotate(360deg);
        opacity:0;
    }
}

/* Clock Glow */

.glow{
    position:absolute;
    width:620px;
    height:620px;
    border-radius:50%;
    border:2px solid rgba(103,232,249,.15);
    animation:pulse 5s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
        opacity:.4;
    }
    50%{
        transform:scale(1.08);
        opacity:.1;
    }
}

/* Clock */

.clock{
    width:500px;
    height:500px;
    position:relative;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    backdrop-filter:blur(30px);
    background:var(--glass);
    border:2px solid var(--glass-border);

    transform-style:preserve-3d;
    transition:transform .15s ease-out;

    box-shadow:
        0 0 50px rgba(155,92,255,.35),
        0 0 120px rgba(103,232,249,.18),
        inset 0 0 80px rgba(255,255,255,.05);
}

.clock::before{
    content:'';
    position:absolute;
    width:95%;
    height:95%;
    border-radius:50%;
    border:2px dashed rgba(103,232,249,.4);
    animation:spin 60s linear infinite;
}

.clock::after{
    content:'';
    position:absolute;
    width:88%;
    height:88%;
    border-radius:50%;
    border:1px solid rgba(192,132,252,.15);
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes spinReverse{
    from{transform:rotate(360deg);}
    to{transform:rotate(0deg);}
}

/* Hologram */

.hologram{
    position:absolute;
    inset:0;
    border-radius:50%;
    overflow:hidden;
    pointer-events:none;
}

.hologram::before{
    content:'';
    position:absolute;
    inset:-50%;
    background:
        linear-gradient(
            120deg,
            transparent 35%,
            rgba(255,255,255,.15) 50%,
            transparent 65%
        );
    animation:holoScan 8s linear infinite;
}

@keyframes holoScan{
    from{
        transform:translateX(-100%) rotate(20deg);
    }
    to{
        transform:translateX(100%) rotate(20deg);
    }
}

/* Energy Rings */

.energy-ring{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
}

.ring1{
    width:110%;
    height:110%;
    border:1px solid rgba(103,232,249,.25);
    animation:spin 20s linear infinite;
}

.ring2{
    width:120%;
    height:120%;
    border:1px dashed rgba(192,132,252,.2);
    animation:spinReverse 35s linear infinite;
}

/* Gears */

.gear{
    position:absolute;
    border-radius:50%;
    border:5px solid rgba(255,255,255,.18);
    backdrop-filter:blur(10px);

    box-shadow:
        0 0 20px rgba(103,232,249,.15),
        inset 0 0 20px rgba(255,255,255,.05);

    animation:gearRotate linear infinite;
}

.gear::before{
    content:'';
    position:absolute;
    inset:15%;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.25);
}

.g1{
    width:180px;
    height:180px;
    top:120px;
    left:70px;
    animation-duration:12s;
}

.g2{
    width:120px;
    height:120px;
    right:70px;
    top:110px;
    animation-duration:8s;
    animation-direction:reverse;
}

.g3{
    width:90px;
    height:90px;
    right:120px;
    bottom:90px;
    animation-duration:5s;
}

@keyframes gearRotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Numbers */

.number{
    position:absolute;
    color:var(--purple);
    font-size:28px;
    font-weight:bold;
    text-shadow:
        0 0 10px var(--purple),
        0 0 25px rgba(192,132,252,.6);
}

/* Hands */

.hand{
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom;
    border-radius:20px;
}

.hour{
    width:8px;
    height:120px;
    background:var(--white);
    box-shadow:0 0 10px rgba(255,255,255,.7);
}

.minute{
    width:5px;
    height:170px;
    background:#dbeafe;
    box-shadow:0 0 12px rgba(103,232,249,.5);
}

.second{
    width:2px;
    height:210px;
    background:var(--cyan);
    box-shadow:
        0 0 12px var(--cyan),
        0 0 24px var(--cyan);
}

/* Center */

.center{
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--cyan);
    z-index:10;

    box-shadow:
        0 0 15px var(--cyan),
        0 0 40px var(--cyan);
}

/* Orbit Particles */

.core-particles{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

.core-particle{
    position:absolute;
    width:4px;
    height:4px;
    left:50%;
    top:50%;
    border-radius:50%;
    background:var(--cyan);

    box-shadow:
        0 0 10px var(--cyan),
        0 0 20px var(--cyan);

    animation:orbit linear infinite;
}

@keyframes orbit{
    from{
        transform:rotate(0deg)
        translateX(60px)
        rotate(0deg);
    }

    to{
        transform:rotate(360deg)
        translateX(60px)
        rotate(-360deg);
    }
}

/* Digital */

.digital{
    position:absolute;
    bottom:-70px;
    color:var(--white);
    font-size:28px;
    letter-spacing:4px;

    text-shadow:
        0 0 10px var(--cyan),
        0 0 20px rgba(103,232,249,.3);
}

/* Mobile */

@media(max-width:768px){

    .clock{
        width:350px;
        height:350px;
    }

    .glow{
        width:430px;
        height:430px;
    }

    .number{
        font-size:20px;
    }

    .digital{
        font-size:18px;
        bottom:-50px;
    }

    .g1{
        width:120px;
        height:120px;
    }

    .g2{
        width:90px;
        height:90px;
    }

    .g3{
        width:60px;
        height:60px;
    }

    .hour{height:90px;}
    .minute{height:120px;}
    .second{height:150px;}
}
</style>
</head>

<body>

<div class="nebula nebula1"></div>
<div class="nebula nebula2"></div>

<div class="aurora"></div>
<div class="milky-way"></div>

<div class="stars" id="stars"></div>
<div class="shooting-stars" id="shootingStars"></div>

<div class="glow"></div>

<div class="clock" id="clock">

    <div class="hologram"></div>

    <div class="energy-ring ring1"></div>
    <div class="energy-ring ring2"></div>

    <div class="core-particles" id="coreParticles"></div>

    <div class="gear g1"></div>
    <div class="gear g2"></div>
    <div class="gear g3"></div>

    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>

    <div class="center"></div>

    <div class="digital" id="digital"></div>

</div>

<script>

// Stars
const stars = document.getElementById('stars');

for(let i=0;i<300;i++){

    const star = document.createElement('div');

    star.className = 'star';

    const size = Math.random()*3;

    star.style.width = size + 'px';
    star.style.height = size + 'px';

    star.style.left = Math.random()*100 + '%';
    star.style.top = Math.random()*100 + '%';

    star.style.animationDelay = Math.random()*3 + 's';

    stars.appendChild(star);
}

// Petals
for(let i=0;i<25;i++){

    const petal = document.createElement('div');

    petal.className = 'petal';

    petal.style.left = Math.random()*100 + '%';

    petal.style.animationDuration =
        (10 + Math.random()*10) + 's';

    petal.style.animationDelay =
        Math.random()*10 + 's';

    document.body.appendChild(petal);
}

// Roman Numerals
const clock = document.getElementById('clock');

const romans = [
'XII','I','II','III','IV','V',
'VI','VII','VIII','IX','X','XI'
];

const radius = window.innerWidth < 768 ? 150 : 220;

for(let i=0;i<12;i++){

    const num = document.createElement('div');

    num.className = 'number';

    num.innerHTML = romans[i];

    const angle = i * 30;

    const x = Math.sin(angle * Math.PI / 180) * radius;
    const y = -Math.cos(angle * Math.PI / 180) * radius;

    num.style.left = '50%';
    num.style.top = '50%';

    num.style.transform =
        `translate(${x}px,${y}px) translate(-50%,-50%)`;

    clock.appendChild(num);
}

// Orbit Particles
const core = document.getElementById('coreParticles');

for(let i=0;i<12;i++){

    const particle = document.createElement('div');

    particle.className = 'core-particle';

    particle.style.animationDuration =
        (6 + Math.random()*8) + 's';

    particle.style.animationDelay =
        (-Math.random()*10) + 's';

    core.appendChild(particle);
}

// Shooting Stars
const shooting = document.getElementById('shootingStars');

function createShootingStar(){

    const star = document.createElement('div');

    star.className = 'shooting-star';

    star.style.left = Math.random()*window.innerWidth + 'px';
    star.style.top = Math.random()*40 + '%';

    shooting.appendChild(star);

    setTimeout(()=>{
        star.remove();
    },3000);
}

setInterval(createShootingStar,2500);

// Smooth Clock
function updateClock(){

    const now = new Date();

    const sec = now.getSeconds();
    const min = now.getMinutes();
    const hour = now.getHours()%12;
    const ms = now.getMilliseconds();

    const secondDeg = (sec + ms/1000) * 6;
    const minuteDeg = min * 6 + secondDeg / 60;
    const hourDeg = hour * 30 + minuteDeg / 12;

    hourHand.style.transform =
        `translateX(-50%) rotate(${hourDeg}deg)`;

    minuteHand.style.transform =
        `translateX(-50%) rotate(${minuteDeg}deg)`;

    secondHand.style.transform =
        `translateX(-50%) rotate(${secondDeg}deg)`;

    digital.innerHTML = now.toLocaleTimeString();

    requestAnimationFrame(updateClock);
}

const hourHand = document.getElementById('hour');
const minuteHand = document.getElementById('minute');
const secondHand = document.getElementById('second');
const digital = document.getElementById('digital');

updateClock();

// Mouse Parallax
document.addEventListener('mousemove',(e)=>{

    const x = (e.clientX/window.innerWidth - .5) * 20;
    const y = (e.clientY/window.innerHeight - .5) * 20;

    clock.style.transform =
        `rotateY(${x}deg) rotateX(${-y}deg)`;
});

</script>

</body>
</html>
